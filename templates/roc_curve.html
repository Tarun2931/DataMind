<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROC Curve — DataMind</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#070B17;color:white;padding:45px;overflow-x:hidden;min-height:100vh;}
body::before{content:"";position:fixed;width:650px;height:650px;background:#2563eb;left:-250px;top:-250px;filter:blur(180px);opacity:.25;border-radius:50%;z-index:-2;}
body::after{content:"";position:fixed;width:650px;height:650px;background:#8b5cf6;right:-250px;bottom:-250px;filter:blur(180px);opacity:.22;border-radius:50%;z-index:-2;}
.wrap{max-width:1450px;margin:auto;}
.page-title{font-size:48px;font-weight:700;margin-bottom:35px;background:linear-gradient(90deg,#4facfe,#9f67ff);background-clip:text;-webkit-background-clip:text;color:transparent;-webkit-text-fill-color:transparent;}
.card-box{background:rgba(17,24,39,.82);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.08);border-radius:22px;padding:35px;margin-bottom:30px;box-shadow:0 20px 40px rgba(0,0,0,.35);transition:.3s;}
.card-box:hover{transform:translateY(-3px);box-shadow:0 20px 50px rgba(37,99,235,.25);}
.section-title{font-size:20px;font-weight:600;margin-bottom:22px;color:#e2e8f0;display:flex;align-items:center;gap:10px;}
.section-title i{font-size:22px;}
.auc-badge{display:inline-flex;align-items:center;gap:10px;padding:14px 24px;border-radius:14px;background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.3);margin-bottom:24px;}
.auc-badge .auc-label{font-size:13px;color:#64748b;font-weight:500;letter-spacing:.4px;text-transform:uppercase;}
.auc-badge .auc-value{font-size:26px;font-weight:700;color:#34d399;}
.graph-output{min-height:420px;border-radius:18px;border:1px solid rgba(79,172,254,.22);display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0D1320;padding:18px;position:relative;overflow:hidden;}
.graph-output img{width:100%;display:block;border-radius:14px;border:1px solid rgba(79,172,254,.18);box-shadow:0 0 32px rgba(79,172,254,.10),0 8px 24px rgba(0,0,0,.5);filter:invert(1) hue-rotate(180deg) saturate(1.15) brightness(0.92);}
.unavailable{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;min-height:280px;color:#475569;}
.unavailable i{font-size:52px;color:#334155;}
.unavailable p{font-size:14px;color:#475569;}
.btn-back{display:inline-flex;align-items:center;gap:8px;padding:12px 26px;border-radius:12px;background:rgba(37,99,235,.15);border:1px solid rgba(37,99,235,.4);color:#4facfe;font-size:14px;font-weight:500;text-decoration:none;transition:.25s;font-family:'Poppins',sans-serif;}
.btn-back:hover{background:rgba(37,99,235,.28);color:white;transform:translateY(-2px);}
@media(max-width:768px){body{padding:25px;}.page-title{font-size:32px;}}
</style>
</head>
<body>
<div class="wrap">

  <h1 class="page-title">
    <i class="bi bi-graph-up-arrow me-3" style="font-size:42px;vertical-align:middle;"></i>ROC Curve
  </h1>

  <div class="card-box">
    <h2 class="section-title">
      <i class="bi bi-image" style="color:#a78bfa;"></i>Generated Graph
    </h2>

    {% if graph_path %}

    <div class="auc-badge">
      <i class="bi bi-trophy-fill" style="font-size:20px;color:#34d399;"></i>
      <div>
        <div class="auc-label">AUC Score</div>
        <div class="auc-value">{{ auc }}</div>
      </div>
    </div>

    <div class="graph-output">
      <img src="{{ graph_path }}" alt="ROC Curve">
    </div>

    {% else %}

    <div class="graph-output">
      <div class="unavailable">
        <i class="bi bi-exclamation-circle"></i>
        <div style="font-size:16px;font-weight:500;color:#94a3b8;">ROC Curve Not Available</div>
        <p>The selected model does not support ROC Curve.</p>
      </div>
    </div>

    {% endif %}
  </div>

  

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
