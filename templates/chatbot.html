<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Data Scientist — DataMind</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#070B17;color:white;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
body::before{content:"";position:fixed;width:650px;height:650px;background:#2563eb;left:-220px;top:-220px;filter:blur(180px);opacity:.25;border-radius:50%;z-index:-2;}
body::after{content:"";position:fixed;width:650px;height:650px;background:#8b5cf6;right:-220px;bottom:-220px;filter:blur(180px);opacity:.22;border-radius:50%;z-index:-2;}

/* ── Topbar ── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 40px;border-bottom:1px solid rgba(255,255,255,.06);background:rgba(7,11,23,.85);backdrop-filter:blur(20px);flex-shrink:0;z-index:10;}
.topbar-logo{font-size:24px;font-weight:800;letter-spacing:-1px;background:linear-gradient(90deg,#4facfe,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.topbar-links{display:flex;gap:10px;}
.topbar-link{padding:8px 18px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:#94a3b8;font-size:13px;font-weight:500;text-decoration:none;display:flex;align-items:center;gap:6px;transition:.2s;}
.topbar-link:hover{background:rgba(255,255,255,.09);color:white;}
.topbar-link.active{background:rgba(37,99,235,.18);border-color:rgba(37,99,235,.45);color:#4facfe;}

/* ── Chat header ── */
.chat-header{padding:22px 40px 0;flex-shrink:0;}
.page-title{font-size:36px;font-weight:700;background:linear-gradient(90deg,#4facfe,#9f67ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;display:flex;align-items:center;gap:12px;}
.status-pill{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:999px;background:rgba(52,211,153,.12);border:1px solid rgba(52,211,153,.25);font-size:12px;color:#34d399;font-weight:500;margin-top:8px;margin-bottom:20px;}
.status-dot{width:7px;height:7px;border-radius:50%;background:#34d399;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}

/* ── Chat window ── */
.chat-outer{flex:1;overflow:hidden;padding:0 40px 20px;display:flex;flex-direction:column;}
.chat-box{flex:1;overflow-y:auto;padding:24px;background:rgba(17,24,39,.75);border:1px solid rgba(255,255,255,.07);border-radius:20px;display:flex;flex-direction:column;gap:16px;scroll-behavior:smooth;}
.chat-box::-webkit-scrollbar{width:5px;}
.chat-box::-webkit-scrollbar-track{background:transparent;}
.chat-box::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:999px;}

/* ── Messages ── */
.msg{display:flex;gap:12px;align-items:flex-end;animation:msgIn .3s ease;}
@keyframes msgIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.msg.user{flex-direction:row-reverse;}

.avatar{width:36px;height:36px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:17px;}
.avatar.bot-av{background:linear-gradient(135deg,#2563eb,#8b5cf6);}
.avatar.user-av{background:rgba(37,99,235,.25);border:1px solid rgba(37,99,235,.4);}

.bubble{max-width:72%;padding:14px 18px;border-radius:18px;font-size:14px;line-height:1.7;word-break:break-word;}
.bubble.bot-bubble{background:rgba(37,99,235,.14);border:1px solid rgba(37,99,235,.22);color:#e2e8f0;border-bottom-left-radius:4px;}
.bubble.user-bubble{background:linear-gradient(135deg,rgba(37,99,235,.55),rgba(139,92,246,.45));border:1px solid rgba(139,92,246,.3);color:#f1f5f9;border-bottom-right-radius:4px;}

.sender-name{font-size:11px;font-weight:600;color:#64748b;margin-bottom:4px;}
.msg.user .sender-name{text-align:right;}

/* Typing indicator */
.typing-bubble{background:rgba(37,99,235,.12);border:1px solid rgba(37,99,235,.2);border-radius:18px;border-bottom-left-radius:4px;padding:14px 20px;display:flex;gap:5px;align-items:center;}
.typing-bubble span{width:7px;height:7px;border-radius:50%;background:#4facfe;opacity:.4;animation:bounce 1.2s infinite;}
.typing-bubble span:nth-child(2){animation-delay:.2s;}
.typing-bubble span:nth-child(3){animation-delay:.4s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.4;}30%{transform:translateY(-6px);opacity:1;}}

/* Empty state */
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:#334155;pointer-events:none;}
.empty-state i{font-size:52px;color:#1e3a5f;}
.empty-state p{font-size:14px;color:#475569;}

/* Suggested prompts */
.suggestions{display:flex;flex-wrap:wrap;gap:8px;padding:12px 40px 0;flex-shrink:0;}
.sug-btn{padding:8px 16px;border-radius:999px;border:1px solid rgba(37,99,235,.3);background:rgba(37,99,235,.08);color:#94a3b8;font-size:12px;font-weight:500;cursor:pointer;transition:.2s;font-family:'Poppins',sans-serif;}
.sug-btn:hover{background:rgba(37,99,235,.2);color:#4facfe;border-color:rgba(37,99,235,.5);}

/* ── Input bar ── */
.input-bar{padding:16px 40px 28px;flex-shrink:0;}
.input-wrap{display:flex;gap:12px;align-items:center;background:rgba(17,24,39,.9);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:10px 10px 10px 20px;transition:.25s;}
.input-wrap:focus-within{border-color:rgba(37,99,235,.55);box-shadow:0 0 20px rgba(37,99,235,.2);}
.chat-input{flex:1;background:transparent;border:none;outline:none;font-size:15px;color:white;font-family:'Poppins',sans-serif;resize:none;height:26px;line-height:26px;}
.chat-input::placeholder{color:#475569;}
.send-btn{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#2563eb,#8b5cf6);border:none;color:white;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.25s;}
.send-btn:hover{transform:scale(1.07);box-shadow:0 8px 20px rgba(37,99,235,.45);}
.send-btn:active{transform:scale(.96);}
.send-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}

@media(max-width:768px){
  body{height:auto;overflow:auto;}
  .chat-outer{height:55vh;}
  .topbar-links{display:none;}
  .topbar{padding:14px 20px;}
  .chat-header{padding:16px 20px 0;}
  .page-title{font-size:26px;}
  .chat-outer{padding:0 16px 16px;}
  .suggestions{padding:10px 16px 0;}
  .input-bar{padding:12px 16px 22px;}
}
</style>
</head>
<body>


<!-- Header -->
<div class="chat-header">
  <div class="page-title">
    <i class="bi bi-robot"></i> CHITTY
  </div>
  <div class="status-pill">
    <span class="status-dot"></span> Online — ready to analyze your dataset
  </div>
</div>

<!-- Suggested prompts -->
<div class="suggestions" id="suggestions">
  <button class="sug-btn" onclick="usePrompt(this)">What are the top features?</button>
  <button class="sug-btn" onclick="usePrompt(this)">Summarize the dataset</button>
  <button class="sug-btn" onclick="usePrompt(this)">Which model performed best?</button>
  <button class="sug-btn" onclick="usePrompt(this)">Any missing values?</button>
  <button class="sug-btn" onclick="usePrompt(this)">Explain the outliers</button>
</div>

<!-- Chat window -->
<div class="chat-outer">
  <div class="chat-box" id="chat-box">
    <div class="empty-state" id="empty-state">
      <i class="bi bi-chat-dots"></i>
      <p>Ask anything about your dataset, models, or results.</p>
    </div>
  </div>
</div>

<!-- Input bar -->
<div class="input-bar">
  <div class="input-wrap">
    <input
      id="question"
      class="chat-input"
      type="text"
      placeholder="Ask anything about your dataset..."
      onkeydown="if(event.key==='Enter')sendMessage()"
    >
    <button class="send-btn" id="send-btn" onclick="sendMessage()">
      <i class="bi bi-send-fill"></i>
    </button>
  </div>
</div>

<script>
function usePrompt(btn){
  document.getElementById('question').value = btn.textContent;
  document.getElementById('question').focus();
}

function removeEmpty(){
  const e = document.getElementById('empty-state');
  if(e) e.remove();
}

function addMessage(role, text){
  const box = document.getElementById('chat-box');
  const isUser = role === 'user';

  const wrap = document.createElement('div');
  wrap.className = 'msg ' + (isUser ? 'user' : 'bot');

  const av = document.createElement('div');
  av.className = 'avatar ' + (isUser ? 'user-av' : 'bot-av');
  av.innerHTML = isUser ? '<i class="bi bi-person-fill"></i>' : '<i class="bi bi-cpu-fill"></i>';

  const inner = document.createElement('div');

  const name = document.createElement('div');
  name.className = 'sender-name';
  name.textContent = isUser ? 'You' : 'AI Data Scientist';

  const bubble = document.createElement('div');
  bubble.className = 'bubble ' + (isUser ? 'user-bubble' : 'bot-bubble');
  bubble.innerHTML = text;

  inner.appendChild(name);
  inner.appendChild(bubble);
  wrap.appendChild(av);
  wrap.appendChild(inner);
  box.appendChild(wrap);
  box.scrollTop = box.scrollHeight;
  return wrap;
}

function addTyping(){
  const box = document.getElementById('chat-box');
  const wrap = document.createElement('div');
  wrap.className = 'msg bot';
  wrap.id = 'typing-indicator';

  const av = document.createElement('div');
  av.className = 'avatar bot-av';
  av.innerHTML = '<i class="bi bi-cpu-fill"></i>';

  const inner = document.createElement('div');
  const name = document.createElement('div');
  name.className = 'sender-name';
  name.textContent = 'AI Data Scientist';

  const tb = document.createElement('div');
  tb.className = 'typing-bubble';
  tb.innerHTML = '<span></span><span></span><span></span>';

  inner.appendChild(name);
  inner.appendChild(tb);
  wrap.appendChild(av);
  wrap.appendChild(inner);
  box.appendChild(wrap);
  box.scrollTop = box.scrollHeight;
}

function removeTyping(){
  const t = document.getElementById('typing-indicator');
  if(t) t.remove();
}

async function sendMessage(){
  const input = document.getElementById('question');
  const btn = document.getElementById('send-btn');
  const question = input.value.trim();
  if(!question) return;

  removeEmpty();
  addMessage('user', question);
  input.value = '';
  btn.disabled = true;

  // Hide suggestions after first message
  const sug = document.getElementById('suggestions');
  if(sug) sug.style.display = 'none';

  addTyping();

  try {
    const formData = new FormData();
    formData.append('question', question);

    const response = await fetch('/ask_ai', {method:'POST', body:formData});
    const data = await response.json();

    removeTyping();
    addMessage('bot', data.answer);
  } catch(err) {
    removeTyping();
    addMessage('bot', '<span style="color:#f87171;">Sorry, something went wrong. Please try again.</span>');
  }

  btn.disabled = false;
  input.focus();
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
