<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DataMind</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  background:#070B17;
  color:white;
  min-height:100vh;
  overflow-x:hidden;
}

/* Animated blobs */
.blob{position:fixed;border-radius:50%;filter:blur(160px);z-index:-2;pointer-events:none;}
.blob-1{width:700px;height:700px;background:#1d4ed8;left:-220px;top:-220px;opacity:.3;animation:b1 14s infinite alternate ease-in-out;}
.blob-2{width:600px;height:600px;background:#7c3aed;right:-180px;bottom:-180px;opacity:.26;animation:b2 18s infinite alternate ease-in-out;}
.blob-3{width:400px;height:400px;background:#0e7490;left:40%;top:30%;opacity:.1;animation:b3 20s infinite alternate ease-in-out;}
@keyframes b1{from{transform:translate(0,0);}to{transform:translate(40px,60px);}}
@keyframes b2{from{transform:translate(0,0);}to{transform:translate(-50px,-40px);}}
@keyframes b3{from{transform:translate(0,0) scale(1);}to{transform:translate(-30px,40px) scale(1.15);}}

/* Noise texture overlay */
body::after{
  content:"";
  position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  opacity:.022;
  pointer-events:none;
  z-index:-1;
}

/* Hero layout */
.hero{min-height:100vh;display:flex;align-items:center;padding:60px 0;}

/* Left side */
.brand-logo{
  font-size:86px;font-weight:800;letter-spacing:-5px;line-height:1;
  background:linear-gradient(120deg,#60b8ff 0%,#a78bfa 55%,#f472b6 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 40px rgba(96,184,255,.18));
}
.brand-tagline{
  font-size:19px;font-weight:300;color:#94a3b8;
  margin-top:14px;letter-spacing:.5px;
}
.divider{
  width:52px;height:3px;
  background:linear-gradient(90deg,#4facfe,#a78bfa);
  border-radius:99px;margin:28px 0;
}
.feature-list{display:flex;flex-direction:column;gap:12px;}
.feature-item{
  display:flex;align-items:center;gap:12px;
  font-size:14px;color:#94a3b8;font-weight:400;
}
.feature-item i{
  font-size:16px;color:#4facfe;
  background:rgba(79,172,254,.1);
  padding:7px;border-radius:8px;flex-shrink:0;
}

/* Upload card */
.upload-card{
  background:rgba(15,21,36,.75);
  border:1px solid rgba(255,255,255,.07);
  backdrop-filter:blur(24px);
  border-radius:28px;
  padding:50px 48px;
  box-shadow:0 32px 64px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.04) inset;
  position:relative;
  overflow:hidden;
  transition:box-shadow .4s;
}
.upload-card::before{
  content:"";
  position:absolute;
  top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(79,172,254,.35),transparent);
}
.upload-card:hover{
  box-shadow:0 40px 80px rgba(0,0,0,.55), 0 0 60px rgba(37,99,235,.12), 0 0 0 1px rgba(255,255,255,.06) inset;
}

.card-heading{
  font-size:22px;font-weight:600;
  text-align:center;margin-bottom:36px;color:#e2e8f0;
  letter-spacing:-.3px;
}
.card-heading span{
  background:linear-gradient(90deg,#4facfe,#a78bfa);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}

/* Form fields */
.field-group{margin-bottom:22px;}
.field-label{
  display:block;font-size:12px;font-weight:600;
  color:#64748b;letter-spacing:.8px;text-transform:uppercase;
  margin-bottom:10px;
}
.dm-input{
  width:100%;background:#080e1c;
  border:1px solid #1a2540;
  height:56px;border-radius:14px;
  font-size:15px;color:white;
  padding:0 18px;
  font-family:'Poppins',sans-serif;
  transition:.3s;outline:none;
}
.dm-input:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(37,99,235,.15);}
.dm-input::placeholder{color:#334155;}

/* File input */
.file-input-wrap{
  position:relative;
  width:100%;height:56px;
  border-radius:14px;
  border:1px dashed #1e3358;
  background:#080e1c;
  display:flex;align-items:center;
  overflow:hidden;
  transition:.3s;
  cursor:pointer;
}
.file-input-wrap:hover{border-color:#3b82f6;background:#0d1526;}
.file-input-wrap input[type=file]{
  position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;
}
.file-input-label{
  display:flex;align-items:center;gap:12px;
  padding:0 18px;pointer-events:none;width:100%;
}
.file-input-label i{font-size:18px;color:#3b82f6;}
.file-input-label span{font-size:14px;color:#475569;}
.file-name{font-size:13px;color:#4facfe;margin-left:auto;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* Submit button */
.btn-submit{
  width:100%;height:58px;
  border-radius:14px;
  background:linear-gradient(135deg,#2563eb 0%,#7c3aed 100%);
  border:none;color:white;
  font-size:16px;font-weight:600;
  letter-spacing:.3px;
  cursor:pointer;
  transition:.35s;
  display:flex;align-items:center;justify-content:center;gap:10px;
  font-family:'Poppins',sans-serif;
  position:relative;overflow:hidden;
  margin-top:8px;
}
.btn-submit::after{
  content:"";
  position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.08),transparent);
}
.btn-submit:hover{transform:translateY(-3px);box-shadow:0 16px 40px rgba(37,99,235,.45);}
.btn-submit:active{transform:translateY(0);}

/* Fade-up animation */
.fade-up{opacity:0;transform:translateY(30px);animation:fadeUp .8s ease forwards;}
.fade-up:nth-child(2){animation-delay:.15s;}
@keyframes fadeUp{to{opacity:1;transform:translateY(0);}}

/* Floating particles */
.particle{
  position:fixed;width:2px;height:2px;
  border-radius:50%;background:rgba(255,255,255,.5);
  pointer-events:none;animation:float linear infinite;z-index:-1;
}
@keyframes float{
  0%{transform:translateY(0);opacity:0;}
  10%{opacity:.6;}
  90%{opacity:.3;}
  100%{transform:translateY(-100vh);opacity:0;}
}

/* Responsive */
@media(max-width:992px){
  .hero{padding:70px 0;}
  .brand-logo{font-size:64px;}
  .left-col{text-align:center;margin-bottom:50px;}
  .divider{margin:28px auto;}
  .feature-list{align-items:center;}
}
@media(max-width:576px){
  .brand-logo{font-size:52px;letter-spacing:-3px;}
  .upload-card{padding:36px 28px;}
}
</style>
</head>
<body>

<!-- Blobs -->
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<div class="container hero">
  <div class="row align-items-center gy-5" style="width:100%;">

    <!-- Left -->
    <div class="col-lg-5 left-col fade-up">
      <div class="brand-logo">DataMind</div>
      <div class="divider"></div>
      <div class="feature-list">
        <div class="feature-item">
          <i class="bi bi-gear-wide-connected"></i>
          Automatic preprocessing & EDA
        </div>
        <div class="feature-item">
          <i class="bi bi-cpu"></i>
          Model training & evaluation
        </div>
        <div class="feature-item">
          <i class="bi bi-bar-chart-line"></i>
          Graph generation & insights
        </div>
        <div class="feature-item">
          <i class="bi bi-stars"></i>
          Predictions & explanations
        </div>
      </div>
    </div>

    <!-- Right -->
    <div class="col-lg-7 fade-up" style="animation-delay:.2s;">
      <div class="upload-card">
        <div class="card-heading">Upload your <span>dataset</span></div>

        <form action="/analyze" method="post" enctype="multipart/form-data">

          <div class="field-group">
            <label class="field-label">DATASET</label>
            <div class="file-input-wrap" id="fileWrap">
              <input type="file" name="file" accept=".csv" required id="fileInput">
              <div class="file-input-label">
                <i class="bi bi-cloud-upload"></i>
                <span id="fileText">DROP YOUR DATASET </span>
                <span class="file-name" id="fileName"></span>
              </div>
            </div>
          </div>

          <div class="field-group">
            <label class="field-label">Target Column</label>
            <input class="dm-input" type="text" name="target" placeholder="e.g.  Price, Survived, Churn…" required>
          </div>

          <button type="submit" class="btn-submit">
            Analyze Dataset
          </button>

        </form>
      </div>
    </div>

  </div>
</div>

<script>
// File name display
document.getElementById('fileInput').addEventListener('change', function(){
  const name = this.files[0]?.name || '';
  if(name){
    document.getElementById('fileText').style.display = 'none';
    document.getElementById('fileName').textContent = name;
  }
});

// Floating particles
for(let i = 0; i < 22; i++){
  const p = document.createElement('div');
  p.className = 'particle';
  p.style.cssText = `
    left:${Math.random()*100}vw;
    top:${Math.random()*100}vh;
    width:${1+Math.random()*2}px;
    height:${1+Math.random()*2}px;
    animation-duration:${8+Math.random()*14}s;
    animation-delay:${Math.random()*8}s;
    opacity:${0.2+Math.random()*0.4};
  `;
  document.body.appendChild(p);
}

// Subtle card tilt
const card = document.querySelector('.upload-card');
document.addEventListener('mousemove', e => {
  const rx = (e.clientY / window.innerHeight - .5) * 6;
  const ry = (e.clientX / window.innerWidth - .5) * -6;
  card.style.transform = `perspective(1000px) rotateX(${rx}deg) rotateY(${ry}deg)`;
});
document.addEventListener('mouseleave', () => {
  card.style.transform = 'perspective(1000px) rotateX(0) rotateY(0)';
});
</script>
</body>
</html>
