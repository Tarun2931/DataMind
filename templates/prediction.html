<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prediction — DataMind</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#070B17;color:white;padding:45px;overflow-x:hidden;min-height:100vh;}
body::before{content:"";position:fixed;width:650px;height:650px;background:#2563eb;left:-250px;top:-250px;filter:blur(180px);opacity:.25;border-radius:50%;z-index:-2;}
body::after{content:"";position:fixed;width:650px;height:650px;background:#8b5cf6;right:-250px;bottom:-250px;filter:blur(180px);opacity:.22;border-radius:50%;z-index:-2;}
.wrap{max-width:860px;margin:auto;}
.page-title{font-size:48px;font-weight:700;margin-bottom:35px;background:linear-gradient(90deg,#4facfe,#9f67ff);background-clip:text;-webkit-background-clip:text;color:transparent;-webkit-text-fill-color:transparent;}
.card-box{background:rgba(17,24,39,.82);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.08);border-radius:22px;padding:35px;margin-bottom:30px;box-shadow:0 20px 40px rgba(0,0,0,.35);transition:.3s;}
.card-box:hover{transform:translateY(-3px);box-shadow:0 20px 50px rgba(37,99,235,.25);}
.section-title{font-size:20px;font-weight:600;margin-bottom:26px;color:#e2e8f0;display:flex;align-items:center;gap:10px;}
.section-title i{font-size:22px;}
.features-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:28px;}
.field-wrap{display:flex;flex-direction:column;gap:8px;}
label.field-label{font-size:13px;font-weight:500;color:#94a3b8;letter-spacing:.4px;}
input.dm-input{width:100%;background:#0f172a;border:1px solid #263246;height:54px;border-radius:12px;font-size:15px;color:white;padding:0 16px;font-family:'Poppins',sans-serif;transition:.25s;outline:none;}
input.dm-input:focus{border-color:#3b82f6;box-shadow:0 0 18px rgba(37,99,235,.35);}
input.dm-input::placeholder{color:#475569;}
.btn-predict{width:100%;height:58px;border-radius:14px;background:linear-gradient(135deg,#2563eb,#8b5cf6);border:none;color:white;font-size:17px;font-weight:600;cursor:pointer;transition:.35s;display:flex;align-items:center;justify-content:center;gap:10px;font-family:'Poppins',sans-serif;}
.btn-predict:hover{transform:translateY(-3px);box-shadow:0 15px 35px rgba(37,99,235,.40);}
.btn-predict:active{transform:translateY(0);}
.result-card{background:rgba(79,172,254,.07);border:1px solid rgba(79,172,254,.25);border-radius:18px;padding:28px 32px;display:flex;align-items:center;gap:20px;}
.result-icon{font-size:42px;color:#4facfe;flex-shrink:0;}
.result-label{font-size:13px;font-weight:500;color:#64748b;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px;}
.result-value{font-size:32px;font-weight:700;background:linear-gradient(90deg,#4facfe,#a78bfa);background-clip:text;-webkit-background-clip:text;color:transparent;-webkit-text-fill-color:transparent;}
.btn-back{display:inline-flex;align-items:center;gap:8px;padding:12px 26px;border-radius:12px;background:rgba(37,99,235,.15);border:1px solid rgba(37,99,235,.4);color:#4facfe;font-size:14px;font-weight:500;text-decoration:none;transition:.25s;font-family:'Poppins',sans-serif;}
.btn-back:hover{background:rgba(37,99,235,.28);color:white;transform:translateY(-2px);}
@media(max-width:768px){body{padding:25px;}.page-title{font-size:32px;}.features-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="wrap">

  <h1 class="page-title">
    <i class="bi bi-stars me-3" style="font-size:42px;vertical-align:middle;"></i>Prediction
  </h1>

  {% if feature_names %}
  <div class="card-box">
    <h2 class="section-title">
      <i class="bi bi-input-cursor-text" style="color:#4facfe;"></i>Enter Feature Values
    </h2>

    <form action="/predict" method="post">
      <div class="features-grid">
        {% for feature in feature_names %}
        <div class="field-wrap">
          <label class="field-label">{{ feature }}</label>
          <input class="dm-input" type="number" step="any" name="{{ feature }}" placeholder="Enter value…" required>
        </div>
        {% endfor %}
      </div>

      <button type="submit" class="btn-predict">
        <i class="bi bi-lightning-charge-fill"></i>
        Predict
      </button>
    </form>
  </div>
  {% endif %}

  {% if prediction %}
  <div class="card-box">
    <h2 class="section-title">
      <i class="bi bi-check-circle-fill" style="color:#34d399;"></i>Result
    </h2>
    <div class="result-card">
      <i class="bi bi-graph-up-arrow result-icon"></i>
      <div>
        <div class="result-label">Predicted Value</div>
        <div class="result-value">{{ prediction }}</div>
      </div>
    </div>
  </div>
  {% endif %}

  

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
